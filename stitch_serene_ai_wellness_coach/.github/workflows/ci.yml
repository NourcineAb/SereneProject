name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          ENVIRONMENT: test
          JWT_SECRET: test-secret-key-that-is-long-enough-for-validation
          RATE_LIMIT_ENABLED: "false"
          FIELD_ENCRYPTION_KEY: ""
        run: pytest tests/ -v --tb=short

      - name: Run type check
        run: pip install mypy && mypy app/ --ignore-missing-imports || true

  mobile-typecheck:
    name: Mobile Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, mobile-typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t serene-backend ./backend

      - name: Build mobile web image
        run: docker build -t serene-mobile-web ./app-mobile
