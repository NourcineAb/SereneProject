<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        .animate-breathe {
            animation: breathe 8s ease-in-out infinite;
        }

        .step-active {
            @apply border-primary text-primary font-bold scale-110;
        }

        .glass-container {
            background: rgba(232, 255, 241, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(15, 82, 56, 0.05);
        }

        .soft-glow {
            box-shadow: 0 0 60px 10px rgba(15, 82, 56, 0.08);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#a8e7c5",
                        "secondary": "#4e653f",
                        "tertiary": "#484744",
                        "primary": "#0f5238",
                        "inverse-primary": "#95d4b3",
                        "inverse-surface": "#21342b",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#d0ebbb",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#c8c6c2",
                        "on-tertiary-fixed": "#1c1c19",
                        "on-secondary-fixed-variant": "#374d2a",
                        "surface-container": "#ddf3e5",
                        "primary-fixed": "#b1f0ce",
                        "primary-fixed-dim": "#95d4b3",
                        "on-tertiary": "#ffffff",
                        "on-background": "#0c1f17",
                        "on-tertiary-fixed-variant": "#474743",
                        "on-surface-variant": "#404943",
                        "surface-variant": "#d1e8da",
                        "surface-bright": "#e8fff1",
                        "tertiary-fixed": "#e5e2dd",
                        "surface-container-low": "#e2f9eb",
                        "surface-container-highest": "#d1e8da",
                        "outline-variant": "#bfc9c1",
                        "outline": "#707973",
                        "secondary-container": "#d0ebbb",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#d7eee0",
                        "surface-tint": "#2c694e",
                        "surface": "#e8fff1",
                        "on-surface": "#0c1f17",
                        "on-secondary-container": "#546b45",
                        "surface-container-lowest": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary-container": "#2d6a4f",
                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#0e5138",
                        "secondary-fixed-dim": "#b5cea1",
                        "background": "#e8fff1",
                        "on-tertiary-container": "#dcd9d4",
                        "surface-dim": "#c9dfd2",
                        "inverse-on-surface": "#e0f6e8",
                        "on-secondary-fixed": "#0d2003",
                        "tertiary-container": "#605f5b",
                        "on-primary-fixed": "#002114",
                        "on-secondary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "section-gap": "40px",
                        "container-padding-desktop": "48px",
                        "gutter": "16px",
                        "container-padding-mobile": "24px"
                    },
                    "fontFamily": {
                        "display-lg": ["Quicksand"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Quicksand"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "title-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Quicksand"],
                        "body-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-sm": ["13px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-lg-mobile": ["26px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen font-body-md overflow-hidden flex flex-col">
<!-- Top Navigation Anchor -->
<nav class="flex justify-between items-center px-container-mobile py-4 w-full bg-background z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[28px]" data-icon="spa">spa</span>
<span class="font-display-lg text-headline-lg-mobile text-primary">Serene</span>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-outline" data-icon="close">close</span>
</div>
</nav>
<!-- Main Exercise Canvas -->
<main class="flex-1 flex flex-col items-center justify-center relative px-container-mobile">
<!-- Atmospheric Background Element -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center overflow-hidden">
<div class="w-[150%] h-[150%] rounded-full bg-surface-container-low opacity-20 blur-[100px]"></div>
</div>
<!-- Guided Breath Hero Section -->
<div class="w-full max-w-md flex flex-col items-center gap-section-gap relative z-10">
<header class="text-center">
<h1 class="font-display-lg text-headline-lg text-primary mb-2">Respiration au carré</h1>
<p class="font-body-md text-outline">Trouvez votre équilibre intérieur</p>
</header>
<!-- Interactive Breathing Circle -->
<div class="relative w-72 h-72 flex items-center justify-center" id="breathing-circle-container">
<!-- Outer Glow -->
<div class="absolute inset-0 rounded-full bg-primary/10 transition-all duration-[4000ms] ease-in-out scale-90" id="outer-circle"></div>
<!-- Main Breathing Orb -->
<div class="w-56 h-56 rounded-full bg-primary text-on-primary flex flex-col items-center justify-center soft-glow transition-all duration-[4000ms] ease-in-out shadow-lg z-20" id="breathing-orb">
<span class="font-display-lg text-display-lg mb-1" id="instruction-text">Inspirer</span>
<span class="font-label-sm text-label-sm opacity-80" id="timer-text">4s</span>
</div>
<!-- Pulsing Aura -->
<div class="absolute inset-0 rounded-full border-2 border-primary/20 animate-breathe"></div>
</div>
<!-- Progression Steps Indicators -->
<div class="w-full flex justify-between gap-4 mt-8 px-4">
<div class="step-indicator flex flex-col items-center gap-2 flex-1" data-step="0">
<div class="w-12 h-12 rounded-full border-2 border-outline-variant flex items-center justify-center transition-all duration-500 bg-surface-container-lowest">
<span class="material-symbols-outlined text-xl" data-icon="air">air</span>
</div>
<span class="font-label-sm text-label-sm text-outline">Inspirer</span>
</div>
<div class="step-indicator flex flex-col items-center gap-2 flex-1 opacity-40" data-step="1">
<div class="w-12 h-12 rounded-full border-2 border-outline-variant flex items-center justify-center transition-all duration-500 bg-surface-container-lowest">
<span class="material-symbols-outlined text-xl" data-icon="pause">pause</span>
</div>
<span class="font-label-sm text-label-sm text-outline">Bloquer</span>
</div>
<div class="step-indicator flex flex-col items-center gap-2 flex-1 opacity-40" data-step="2">
<div class="w-12 h-12 rounded-full border-2 border-outline-variant flex items-center justify-center transition-all duration-500 bg-surface-container-lowest">
<span class="material-symbols-outlined text-xl" data-icon="wind_power">wind_power</span>
</div>
<span class="font-label-sm text-label-sm text-outline">Expirer</span>
</div>
<div class="step-indicator flex flex-col items-center gap-2 flex-1 opacity-40" data-step="3">
<div class="w-12 h-12 rounded-full border-2 border-outline-variant flex items-center justify-center transition-all duration-500 bg-surface-container-lowest">
<span class="material-symbols-outlined text-xl" data-icon="pause">pause</span>
</div>
<span class="font-label-sm text-label-sm text-outline">Bloquer</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Shell -->
<footer class="w-full px-container-mobile pb-12 pt-6 flex justify-center z-50">
<button class="bg-surface-container-highest text-primary font-title-md py-4 px-12 rounded-full flex items-center gap-3 active:scale-95 transition-all duration-200 border border-outline-variant/30">
<span class="material-symbols-outlined" data-icon="stop_circle">stop_circle</span>
            Arrêter l'exercice
        </button>
</footer>
<script>
        const steps = [
            { text: 'Inspirer', scale: 'scale-110', glowScale: 'scale-125' },
            { text: 'Bloquer', scale: 'scale-110', glowScale: 'scale-125' },
            { text: 'Expirer', scale: 'scale-100', glowScale: 'scale-90' },
            { text: 'Bloquer', scale: 'scale-100', glowScale: 'scale-90' }
        ];

        let currentStep = 0;
        let timeLeft = 4;
        
        const orb = document.getElementById('breathing-orb');
        const outerCircle = document.getElementById('outer-circle');
        const instructionText = document.getElementById('instruction-text');
        const timerText = document.getElementById('timer-text');
        const indicators = document.querySelectorAll('.step-indicator');

        function updateUI() {
            const step = steps[currentStep];
            
            // Update Text
            instructionText.innerText = step.text;
            timerText.innerText = `${timeLeft}s`;
            
            // Update Circle Animations
            orb.classList.remove('scale-100', 'scale-110');
            orb.classList.add(step.scale);
            
            outerCircle.classList.remove('scale-90', 'scale-125');
            outerCircle.classList.add(step.glowScale);

            // Update Indicators
            indicators.forEach((ind, index) => {
                if(index === currentStep) {
                    ind.style.opacity = "1";
                    ind.querySelector('div').classList.add('border-primary', 'bg-primary-fixed');
                    ind.querySelector('div').classList.remove('border-outline-variant', 'bg-surface-container-lowest');
                    ind.querySelector('span:last-child').classList.add('text-primary', 'font-bold');
                } else {
                    ind.style.opacity = "0.4";
                    ind.querySelector('div').classList.remove('border-primary', 'bg-primary-fixed');
                    ind.querySelector('div').classList.add('border-outline-variant', 'bg-surface-container-lowest');
                    ind.querySelector('span:last-child').classList.remove('text-primary', 'font-bold');
                }
            });
        }

        setInterval(() => {
            timeLeft--;
            if (timeLeft < 0) {
                currentStep = (currentStep + 1) % 4;
                timeLeft = 4;
            }
            updateUI();
        }, 1000);

        // Initial update
        updateUI();
    </script>
</body></html>
