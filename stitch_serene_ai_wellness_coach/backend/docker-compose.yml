services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: serene
      POSTGRES_PASSWORD: serene
      POSTGRES_DB: serene
    ports:
      - "5432:5432"
    volumes:
      - serene_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serene"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://serene:serene@db:5432/serene
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    # Hot-reload for local dev; remove --reload for production image.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app

volumes:
  serene_db:
